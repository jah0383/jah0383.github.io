# .github/workflows/update-data.yml
#
# Downloads new MBMBaM transcript PDFs from the official McElroy Dropbox,
# parses them incrementally, rebuilds the site data JSON files, and commits.
#
# Triggers:
#   - Weekly on Monday at 09:00 UTC (new episodes drop Mondays)
#   - Manual trigger via Actions → Run workflow
#
# Required secrets (Settings → Secrets and variables → Actions):
#   DROPBOX_APP_KEY       — your Dropbox app key
#   DROPBOX_APP_SECRET    — your Dropbox app secret
#   DROPBOX_REFRESH_TOKEN — offline refresh token (see SETUP.md)

name: Update transcript data

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 09:00 UTC
  workflow_dispatch:        # manual trigger
    inputs:
      full_rebuild:
        description: 'Force full rebuild (re-parse all PDFs, ignore existing data)'
        type: boolean
        default: false

# Only one run at a time — prevents races on the JSON files
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit back to the repo

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── 3. Scrape — download only PDFs that aren't already cached ──────────
      #    The PDF folder and parsed_episodes.json are cached between runs so
      #    only new episodes get downloaded and re-parsed each week.
      - name: Restore scrape cache
        id: scrape-cache
        uses: actions/cache@v4
        with:
          path: |
            pdfs/
            parsed_episodes.json
          key: scrape-${{ hashFiles('data/manifest.json') }}
          restore-keys: scrape-

      - name: Scrape new transcripts
        env:
          DROPBOX_APP_KEY:       ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET:    ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: |
          mkdir -p pdfs
          python scripts/scrape_transcripts.py \
            --output pdfs \
            --delay 0.5

      # ── 4. Parse — incremental unless full rebuild requested ───────────────
      - name: Parse transcripts
        run: |
          INCREMENTAL_FLAG=""
          if [ "${{ inputs.full_rebuild }}" != "true" ]; then
            INCREMENTAL_FLAG="--incremental"
          fi

          python scripts/parse_transcripts.py pdfs \
            --output parsed_episodes.json \
            $INCREMENTAL_FLAG

      # ── 5. Rebuild indexes ─────────────────────────────────────────────────
      - name: Build indexes
        run: |
          python scripts/build_index.py parsed_episodes.json \
            --output-dir data

      # ── 6. Commit updated data files if anything changed ───────────────────
      - name: Check for changes
        id: check
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          SUMMARY=$(git diff --cached --stat data/ | tail -1)
          git commit -m "data: auto-update transcripts [skip ci]

          $SUMMARY
          Triggered by: ${{ github.event_name }}"
          git push

      - name: No changes
        if: steps.check.outputs.changed != 'true'
        run: echo "Data files are already up to date — nothing to commit."
<script>
// ──────────────────────────────────────────────────────
// EASING FUNCTIONS
// ──────────────────────────────────────────────────────

const easings = {
    linear(x) {
        return x < 0 ? 0 : x > 1 ? 1 : x;
    },
    smoothStep(x) {
        if (x < 0) return 0;
        if (x > 1) return 1;
        return 3 * x * x - 2 * x * x * x;
    },
    easeInOutCubic(x) {
        if (x < 0) return 0;
        if (x > 1) return 1;
        return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
    },
    easeOutBounce(x) {
        if (x < 0) return 0;
        if (x > 1) return 1;
        const n1 = 7.5625, d1 = 2.75;
        if (x < 1/d1) return n1*x*x;
        if (x < 2/d1) return n1*(x-=1.5/d1)*x+0.75;
        if (x < 2.5/d1) return n1*(x-=2.25/d1)*x+0.9375;
        return n1*(x-=2.625/d1)*x+0.984375;
    },
    easeInBounce(x) {
        return 1 - easings.easeOutBounce(1 - x);
    },
    easeInOutBounce(x) {
        return x < 0.5
            ? (1 - easings.easeOutBounce(1 - 2*x)) / 2
            : (1 + easings.easeOutBounce(2*x - 1)) / 2;
    },
    easeOutElastic(x) {
        if (x < 0) return 0;
        if (x === 0 || x === 1) return x;
        if (x > 1) return 1;
        const c4 = (2 * Math.PI) / 3;
        return Math.pow(2, -10*x) * Math.sin((x*10 - 0.75) * c4) + 1;
    },
    easeInOutElastic(x) {
        if (x < 0) return 0;
        if (x > 1) return 1;
        if (x === 0 || x === 1) return x;
        const c5 = (2 * Math.PI) / 4.5;
        return x < 0.5
            ? -(Math.pow(2, 20*x-10) * Math.sin((20*x-11.125)*c5)) / 2
            : (Math.pow(2, -20*x+10) * Math.sin((20*x-11.125)*c5)) / 2 + 1;
    },
    easeInOutBack(x) {
        if (x < 0) return 0;
        if (x > 1) return 1;
        const c2 = 1.70158 * 1.525;
        return x < 0.5
            ? (Math.pow(2*x, 2) * ((c2+1)*2*x - c2)) / 2
            : (Math.pow(2*x-2, 2) * ((c2+1)*(x*2-2) + c2) + 2) / 2;
    }
};

// ──────────────────────────────────────────────────────
// STAIRCASE FUNCTION (from original)
// ──────────────────────────────────────────────────────

function modify4(func, x, xBeg, xEnd, yBeg, yEnd) {
    return func((x - xBeg) / (xEnd - xBeg)) * (yEnd - yBeg) + yBeg;
}

function funcStairs(func, x, period, steps, amplitude, nfuncPercent, offset) {
    const nfuncPeriod = period * nfuncPercent;
    const funcPeriod = period * (1 - nfuncPercent);
    let sum = 0;
    for (let i = 0; i < steps; i++) {
        const halfStep = (i * period) / steps + period / (2 * steps);
        sum += modify4(func,
            (x + offset) % period,
            halfStep - funcPeriod / steps,
            halfStep + funcPeriod / steps,
            0,
            amplitude / steps
        );
    }
    return sum;
}

// ──────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────

let paused = false;
let count = 0;
let W, H;
const GRAPH_H_RATIO = 0.22;
const GEAR_AREA_RATIO = 0.78;

function getParams() {
    return {
        period:   parseFloat(document.getElementById('s-period').value),
        teeth1:   parseInt(document.getElementById('s-teeth1').value),
        teeth2:   parseInt(document.getElementById('s-teeth2').value),
        flat:     parseFloat(document.getElementById('s-flat').value),
        offset:   parseFloat(document.getElementById('s-offset').value),
        speed:    parseFloat(document.getElementById('s-speed').value),
        depth:    parseFloat(document.getElementById('s-depth').value),
        easing:   document.getElementById('s-easing').value,
    };
}

function updateLabels() {
    const p = getParams();
    document.getElementById('v-period').textContent = p.period;
    document.getElementById('v-teeth1').textContent = p.teeth1;
    document.getElementById('v-teeth2').textContent = p.teeth2;
    document.getElementById('v-flat').textContent = (p.flat * 100).toFixed(0) + '%';
    document.getElementById('v-offset').textContent = (p.offset * 360).toFixed(0) + '°';
    document.getElementById('v-speed').textContent = p.speed.toFixed(1) + '×';
    document.getElementById('v-depth').textContent = p.depth.toFixed(1);
}

function togglePause() {
    paused = !paused;
    document.getElementById('pause-toggle').classList.toggle('active', paused);
}

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
        e.preventDefault();
        togglePause();
    }
});

// Update labels on slider input
document.querySelectorAll('input[type="range"], select').forEach(el => {
    el.addEventListener('input', updateLabels);
});

// ──────────────────────────────────────────────────────
// GEAR DRAWING
// ──────────────────────────────────────────────────────

function drawGear(cx, cy, numTeeth, pitchRadius, rotation, depthMult, isSecondary) {
    const mod = (2 * pitchRadius) / numTeeth;
    const addendum = mod * 1.0 * depthMult;
    const dedendum = mod * 1.15 * depthMult;
    const outerR = pitchRadius + addendum;
    const rootR = pitchRadius - dedendum;
    const hubR = Math.max(pitchRadius * 0.18, 6);
    const boreR = Math.max(hubR * 0.5, 3);
    const toothAng = TWO_PI / numTeeth;
    const toothHW = toothAng * 0.28;
    const tipHW = toothAng * 0.19;

    push();
    translate(cx, cy);
    rotate(rotation);

    // Gear body with teeth
    fill(isSecondary ? '#0f0f18' : '#13131e');
    stroke(isSecondary ? 'rgba(0,224,160,0.25)' : 'rgba(0,224,160,0.45)');
    strokeWeight(1);

    beginShape();
    for (let i = 0; i < numTeeth; i++) {
        const a = i * toothAng;
        // Root arc (gap between teeth)
        const gapStart = a - toothAng / 2;
        const gapEnd = a - toothHW;
        for (let t = 0; t <= 3; t++) {
            const ga = lerp(gapStart, gapEnd, t / 3);
            vertex(rootR * cos(ga), rootR * sin(ga));
        }
        // Leading flank
        vertex(outerR * cos(a - tipHW), outerR * sin(a - tipHW));
        // Tip arc
        for (let t = 0; t <= 2; t++) {
            const ta = lerp(a - tipHW, a + tipHW, t / 2);
            vertex(outerR * cos(ta), outerR * sin(ta));
        }
        // Trailing flank
        vertex(rootR * cos(a + toothHW), rootR * sin(a + toothHW));
    }
    endShape(CLOSE);

    // Lightening holes
    if (pitchRadius > 35) {
        const holeCount = Math.min(numTeeth, 5);
        const holeDist = (rootR + hubR * 2.5) / 2;
        const holeR = Math.min((rootR - hubR * 2.5) * 0.22, holeDist * 0.3);
        if (holeR > 3) {
            fill('#08080c');
            noStroke();
            for (let i = 0; i < holeCount; i++) {
                const a = i * TWO_PI / holeCount;
                ellipse(holeDist * cos(a), holeDist * sin(a), holeR * 2);
            }
        }
    }

    // Hub
    fill('#08080c');
    stroke('rgba(0,224,160,0.3)');
    strokeWeight(1);
    ellipse(0, 0, hubR * 2);

    // Bore
    fill('#08080c');
    stroke('rgba(0,224,160,0.15)');
    strokeWeight(0.5);
    ellipse(0, 0, boreR * 2);

    // Crosshair in bore
    stroke('rgba(0,224,160,0.12)');
    strokeWeight(0.5);
    line(-boreR * 0.7, 0, boreR * 0.7, 0);
    line(0, -boreR * 0.7, 0, boreR * 0.7);

    // Pitch circle (very faint dashed)
    noFill();
    stroke('rgba(0,224,160,0.08)');
    strokeWeight(0.5);
    drawingContext.setLineDash([3, 5]);
    ellipse(0, 0, pitchRadius * 2);
    drawingContext.setLineDash([]);

    pop();
}

// ──────────────────────────────────────────────────────
// GRAPH DRAWING
// ──────────────────────────────────────────────────────

function drawGraph(gx, gy, gw, gh, p) {
    const ef = easings[p.easing];
    const pad = { l: 40, r: 16, t: 12, b: 20 };
    const pw = gw - pad.l - pad.r;
    const ph = gh - pad.t - pad.b;

    push();
    translate(gx, gy);

    // Background
    fill('#06060a');
    noStroke();
    rect(0, 0, gw, gh);

    // Grid lines
    stroke('rgba(255,255,255,0.04)');
    strokeWeight(0.5);
    for (let i = 0; i <= 4; i++) {
        const yy = pad.t + (ph / 4) * i;
        line(pad.l, yy, pad.l + pw, yy);
    }

    // Y-axis labels
    fill('rgba(255,255,255,0.15)');
    noStroke();
    textFont('IBM Plex Mono');
    textSize(8);
    textAlign(RIGHT, CENTER);
    text('360°', pad.l - 6, pad.t);
    text('0°', pad.l - 6, pad.t + ph);

    // X-axis label
    textAlign(CENTER, TOP);
    fill('rgba(255,255,255,0.12)');
    text('1 PERIOD', pad.l + pw / 2, pad.t + ph + 6);

    // Plot curve
    noFill();
    stroke('rgba(0,224,160,0.6)');
    strokeWeight(1.5);
    beginShape();
    for (let i = 0; i <= pw; i++) {
        const x = (i / pw) * p.period;
        const y = funcStairs(ef, x, p.period, p.teeth1, 360, p.flat, p.offset * p.period);
        const px = pad.l + i;
        const py = pad.t + ph - (y / 360) * ph;
        vertex(px, py);
    }
    endShape();

    // Current position marker
    const curX = count % p.period;
    const markerPx = pad.l + (curX / p.period) * pw;
    const curY = funcStairs(ef, curX, p.period, p.teeth1, 360, p.flat, p.offset * p.period);
    const markerPy = pad.t + ph - (curY / 360) * ph;

    // Vertical line
    stroke('rgba(0,224,160,0.2)');
    strokeWeight(0.5);
    line(markerPx, pad.t, markerPx, pad.t + ph);

    // Dot
    fill('#00e0a0');
    noStroke();
    ellipse(markerPx, markerPy, 5);

    pop();
}

// ──────────────────────────────────────────────────────
// P5 SETUP & DRAW
// ──────────────────────────────────────────────────────

function setup() {
    const container = document.getElementById('canvas-container');
    W = container.offsetWidth;
    H = Math.min(window.innerHeight * 0.62, 560);
    const cnv = createCanvas(W, H);
    cnv.parent(container);
    angleMode(RADIANS);
    updateLabels();
}

function draw() {
    const p = getParams();
    const ef = easings[p.easing];

    if (!paused) count += p.speed;

    background(8, 8, 12);

    const gearH = H * GEAR_AREA_RATIO;
    const graphH = H * GRAPH_H_RATIO;

    // Divider
    stroke('rgba(255,255,255,0.06)');
    strokeWeight(0.5);
    line(0, gearH, W, gearH);

    // ── Gear sizing ──
    // Module must be shared for meshing
    const maxGearArea = Math.min(W * 0.42, gearH * 0.75);
    const maxTeeth = Math.max(p.teeth1, p.teeth2);
    const mod = maxGearArea / (maxTeeth + 4); // module with padding
    const pr1 = mod * p.teeth1 / 2;
    const pr2 = mod * p.teeth2 / 2;
    const centerDist = pr1 + pr2;

    // Center the gear pair
    const pairCX = W / 2 - centerDist / 2;
    const pairCY = gearH / 2;

    // ── Compute rotations ──
    const rot1 = funcStairs(ef, count, p.period, p.teeth1, TWO_PI, p.flat, 0)
                 + p.offset * TWO_PI;

    const g2Period = (p.period * p.teeth2) / p.teeth1;
    const rot2 = funcStairs(ef, count, g2Period, p.teeth2, TWO_PI, p.flat, 0)
                 + p.offset * TWO_PI;

    // Mesh phase: offset gear 2 by half a tooth so teeth interleave
    const meshPhase = PI / p.teeth2;

    // ── Draw gears ──
    drawGear(pairCX, pairCY, p.teeth1, pr1, rot1, p.depth, false);
    drawGear(pairCX + centerDist, pairCY, p.teeth2, pr2, -rot2 + meshPhase, p.depth, true);

    // ── Contact point indicator ──
    const cpx = pairCX + pr1;
    noStroke();
    fill('rgba(0,224,160,0.12)');
    ellipse(cpx, pairCY, 6);
    fill('#00e0a0');
    ellipse(cpx, pairCY, 2);

    // ── Gear labels ──
    noStroke();
    fill('rgba(255,255,255,0.12)');
    textFont('IBM Plex Mono');
    textSize(9);
    textAlign(CENTER, TOP);
    text(p.teeth1 + 'T', pairCX, pairCY + pr1 + 14 + (mod * p.depth));
    text(p.teeth2 + 'T', pairCX + centerDist, pairCY + pr2 + 14 + (mod * p.depth));

    // Ratio label
    textSize(10);
    fill('rgba(0,224,160,0.25)');
    const g = gcd(p.teeth1, p.teeth2);
    text(`${p.teeth1/g}:${p.teeth2/g}`, W / 2, gearH - 20);

    // ── Graph ──
    drawGraph(0, gearH + 1, W, graphH - 1, p);
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function windowResized() {
    const container = document.getElementById('canvas-container');
    W = container.offsetWidth;
    H = Math.min(window.innerHeight * 0.62, 560);
    resizeCanvas(W, H);
}
</script>

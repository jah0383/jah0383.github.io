  <style>
    :root {
      --bg:      #03040c;
      --surface: #06091a;
      --border:  #111830;
      --text:    #a8bce0;
      --dim:     #2e3d60;
      --font-h:  'Cinzel', serif;
      --font-m:  'Share Tech Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-m);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 16px 40px;
      overflow-x: hidden;
      position: relative;
    }

    /* Starfield */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 8%  12%, rgba(160,190,255,.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 55%, rgba(160,190,255,.30) 0%, transparent 100%),
        radial-gradient(2px 2px at 38% 18%, rgba(180,200,255,.40) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 72%, rgba(160,190,255,.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 63% 38%, rgba(160,190,255,.35) 0%, transparent 100%),
        radial-gradient(2px 2px at 75% 10%, rgba(180,200,255,.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 62%, rgba(160,190,255,.30) 0%, transparent 100%),
        radial-gradient(1px 1px at 14% 82%, rgba(160,190,255,.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 90%, rgba(160,190,255,.20) 0%, transparent 100%),
        radial-gradient(2px 2px at 92% 88%, rgba(180,200,255,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  48%, rgba(160,190,255,.30) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(160,190,255,.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 32%, rgba(160,190,255,.20) 0%, transparent 100%),
        radial-gradient(1px 1px at 56% 56%, rgba(160,190,255,.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 82% 42%, rgba(160,190,255,.30) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    #header, #display-row, #controls-row, #status-row {
      position: relative;
      z-index: 1;
    }

    /* Header */
    #header {
      text-align: center;
      margin-bottom: 18px;
    }

    #header h1 {
      font-family: var(--font-h);
      font-weight: 900;
      font-size: 24px;
      letter-spacing: 10px;
      color: #7090d8;
      text-shadow: 0 0 24px rgba(80,120,220,.5), 0 0 60px rgba(60,90,200,.2);
      text-transform: uppercase;
    }

    #header .sub {
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--dim);
      margin-top: 7px;
      text-transform: uppercase;
    }

    /* Display row */
    #display-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }

    #canvas-wrap canvas {
      display: block;
    }

    /* Status / resonance */
    #status-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #meter-canvas {
      display: block;
    }

    #res-value {
      font-family: var(--font-h);
      font-size: 17px;
      letter-spacing: 1px;
      color: #4dd9ff;
      text-shadow: 0 0 12px rgba(77,217,255,.5);
      text-align: center;
      width: 60px;
      transition: color .4s, text-shadow .4s;
    }

    #res-label {
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--dim);
      text-transform: uppercase;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    /* Controls */
    #controls-row {
      display: flex;
      gap: 10px;
    }

    .sig-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 10px;
      width: 158px;
      transition: border-color .3s;
    }

    .sig-panel:hover {
      border-color: var(--accent);
    }

    .sig-head {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 8px;
    }

    .sig-gem {
      width: 9px;
      height: 9px;
      transform: rotate(45deg);
      flex-shrink: 0;
      transition: box-shadow .3s;
    }

    .sig-title {
      font-family: var(--font-h);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
    }

    canvas.preview {
      display: block;
      width: 138px;
      height: 82px;
      background: var(--bg);
      border: 1px solid var(--border);
      margin-bottom: 9px;
    }

    .sldr-group {
      margin-bottom: 6px;
    }

    .sldr-labels {
      display: flex;
      justify-content: space-between;
      font-size: 8px;
      color: var(--dim);
      letter-spacing: 1px;
      margin-bottom: 3px;
      text-transform: uppercase;
    }

    .sldr-labels .v {
      color: var(--text);
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
      accent-color: var(--accent);
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 9px;
      height: 9px;
      background: var(--accent);
      transform: rotate(45deg);
      cursor: pointer;
      box-shadow: 0 0 6px var(--accent);
    }

    input[type=range]::-moz-range-thumb {
      width: 9px;
      height: 9px;
      background: var(--accent);
      border: none;
      border-radius: 0;
      box-shadow: 0 0 6px var(--accent);
      cursor: pointer;
    }

    /* Win overlay */
    #win-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: none;
      z-index: 999;
      overflow: hidden;
    }

    .ring {
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      border-style: solid;
      border-width: 1.5px;
      animation: ring-out 2.4s cubic-bezier(.1,.6,.3,1) forwards;
    }

    @keyframes ring-out {
      0%   { transform: translate(-50%,-50%) scale(0); opacity: .9; }
      100% { transform: translate(-50%,-50%) scale(4); opacity: 0;  }
    }

    #win-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-h);
      font-weight: 900;
      font-size: 30px;
      letter-spacing: 8px;
      color: #ffd700;
      text-shadow: 0 0 30px rgba(255,215,0,.9), 0 0 80px rgba(255,180,0,.4);
      text-align: center;
      white-space: nowrap;
      animation: wtext 3s ease-in-out forwards;
    }

    @keyframes wtext {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(.85); }
      15%  { opacity: 1; transform: translate(-50%,-50%) scale(1.04); }
      80%  { opacity: 1; transform: translate(-50%,-50%) scale(1);    }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(1);    }
    }

const WIN_THRESH  = 0.90;
const ERR_NORM    = 52;   // higher → more forgiving meter display
// ============================================================

// Polar-native signal design rules:
//   1. fn(th) must stay in [-1, 1] — radius clamp below is a safety net, not a crutch
//   2. Prefer smooth/continuous functions; hard steps create a visible radial seam
//   3. For step-like shapes use Math.tanh(k * expr) — smooths discontinuities, hard-clamps to (-1,1)
//   4. For window-like shapes use (1 + Math.cos(n*th)) / 2 or tanh product pairs
const SIGNALS = [
  { name: 'Prima',   color: '#4ddcff', rgb: [77,  220, 255],
    // 3-petal rose
    fn: th => Math.sin(3 * th) * Math.tanh(Math.sin(4*th)) },
  { name: 'Secunda', color: '#ffcc44', rgb: [255, 204, 68 ],
    // 5-petal rose
    fn: th => Math.sin(5 * th) },
  { name: 'Tertia',  color: '#ff5580', rgb: [255, 85,  128],
    // tanh-smoothed step-like: 4-lobe petal with crisp-but-continuous edges (no seam)
    fn: th => Math.tanh(2 * Math.sin(3 * th)) * Math.tanh(5 * Math.sin(7 * th)) },
  { name: 'Quarta',  color: '#bb66ff', rgb: [187, 102, 255],
    // product interference: asymmetric, smooth
    fn: th => Math.sin(2*th) * Math.cos(3*th) * Math.cos(10*th)},
  { name: 'Quinta',  color: '#44ffbb', rgb: [68,  255, 187],
    // raised-cosine window lobes: always in [0,1] → shifted to [-1,1]; smooth, no discontinuities
    fn: th => Math.cos(6 * th) * Math.abs(Math.cos(th)) }
];

const BASE_R    = 118;
const MAX_AMP   = 38;
const N         = 360;

let pAmps   = SIGNALS.map(() => 0);
let pPhases = SIGNALS.map(() => 0);
let lastRes = 0;
let winLock = false;

// ---- Polar points ----
function polarPts(amps, phases) {
  const pts = [];
  for (let i = 0; i < N; i++) {
    const th = (i / N) * Math.PI * 2;
    let r = BASE_R;
    for (let j = 0; j < SIGNALS.length; j++) {
      r += amps[j] * MAX_AMP * SIGNALS[j].fn(th + phases[j]);
    }
    // Safety clamp: prevents radius inversion if a fn escapes [-1,1].
    // r going negative causes the point to mirror through the origin,
    // producing a starburst fold artifact.
    r = Math.max(BASE_R * 0.15, r);
    pts.push([r * Math.cos(th), r * Math.sin(th)]);
  }
  return pts;
}

// ---- Resonance ----
function resonance() {
  const tPts = polarPts(TARGET_CONFIG.map(t=>t.amp), TARGET_CONFIG.map(t=>t.phase));
  const pPts = polarPts(pAmps, pPhases);
  let err = 0;
  for (let i = 0; i < N; i++) {
    const dx = tPts[i][0] - pPts[i][0];
    const dy = tPts[i][1] - pPts[i][1];
    err += Math.sqrt(dx*dx + dy*dy);
  }
  return Math.max(0, Math.min(1, 1 - (err/N) / ERR_NORM));
}

// ---- Mini preview ----
function miniPreview(idx) {
  const cv = document.getElementById(`pv${idx}`);
  const cx2 = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const ox = W/2, oy = H/2;
  const pr = Math.min(W, H) * 0.32;
  const [r, g, b] = SIGNALS[idx].rgb;
  const a = pAmps[idx], ph = pPhases[idx];

  cx2.clearRect(0, 0, W, H);
  cx2.fillStyle = '#03040c';
  cx2.fillRect(0, 0, W, H);

  // Guide circles
  cx2.strokeStyle = '#111830';
  cx2.lineWidth = 0.5;
  for (let c of [0.5, 1.0]) {
    cx2.beginPath(); cx2.arc(ox, oy, pr*c, 0, Math.PI*2); cx2.stroke();
  }

  // Signal shape — 3 glow passes
  const passes = [[6, .10], [2.5, .28], [1, .90]];
  for (const [lw, alpha] of passes) {
    cx2.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
    cx2.lineWidth = lw;
    cx2.shadowColor = `rgba(${r},${g},${b},.5)`;
    cx2.shadowBlur = lw > 1 ? 0 : 8;
    cx2.beginPath();
    for (let k = 0; k <= N; k++) {
      const th = (k/N)*Math.PI*2;
      const rv = pr + a * pr * 0.82 * SIGNALS[idx].fn(th + ph);
      const x = ox + rv*Math.cos(th), y = oy + rv*Math.sin(th);
      k===0 ? cx2.moveTo(x,y) : cx2.lineTo(x,y);
    }
    cx2.closePath(); cx2.stroke(); cx2.shadowBlur = 0;
  }
}
SIGNALS.forEach((_, i) => miniPreview(i));

// ---- Crystal meter ----
function drawMeter(res) {
  const cv = document.getElementById('meter-canvas');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const cx = W/2;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#03040c';
  ctx.fillRect(0, 0, W, H);

  const tipH = 20, bW = 22, bH = H - tipH*2 - 12;
  const bX = cx - bW/2, bY = tipH + 6;

  // Top tip
  ctx.fillStyle = '#0a0f22'; ctx.strokeStyle = '#1a2545'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx, 3); ctx.lineTo(cx+bW/2+4, bY); ctx.lineTo(cx-bW/2-4, bY);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Body bg
  ctx.fillStyle = '#050816';
  ctx.fillRect(bX, bY, bW, bH);
  ctx.strokeStyle = '#1a2545'; ctx.strokeRect(bX, bY, bW, bH);

  // Bottom tip
  ctx.fillStyle = '#0a0f22'; ctx.strokeStyle = '#1a2545';
  ctx.beginPath();
  ctx.moveTo(bX, bY+bH); ctx.lineTo(bX+bW, bY+bH); ctx.lineTo(cx, H-3);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Fill
  if (res > 0.001) {
    const fH = bH * res, fY = bY + bH - fH;
    const grd = ctx.createLinearGradient(0, fY+fH, 0, fY);
    if (res < 0.55) {
      grd.addColorStop(0, 'rgba(20,50,180,.4)');
      grd.addColorStop(1, 'rgba(77,220,255,.9)');
    } else if (res < WIN_THRESH) {
      grd.addColorStop(0, 'rgba(77,220,255,.5)');
      grd.addColorStop(.6, 'rgba(160,80,255,.85)');
      grd.addColorStop(1, 'rgba(200,120,255,.95)');
    } else {
      grd.addColorStop(0, 'rgba(220,130,0,.7)');
      grd.addColorStop(.5, 'rgba(255,210,0,.95)');
      grd.addColorStop(1, 'rgba(255,255,180,1)');
    }
    const sc = res > WIN_THRESH ? 'rgba(255,200,0,.7)' : res > .55 ? 'rgba(160,80,255,.5)' : 'rgba(77,220,255,.4)';
    ctx.shadowColor = sc; ctx.shadowBlur = 14;
    ctx.fillStyle = grd;
    ctx.fillRect(bX+1, fY, bW-2, fH);
    ctx.shadowBlur = 0;

    // Shine
    ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx-bW/4, fY+3); ctx.lineTo(cx-bW/4, fY+fH-3); ctx.stroke();
  }

  // Tick marks
  ctx.strokeStyle = '#1a2545'; ctx.lineWidth = 1;
  for (let t = 0; t <= 10; t++) {
    const ty = bY + bH - (bH/10)*t;
    const isMaj = t%5===0;
    ctx.beginPath(); ctx.moveTo(bX-2, ty); ctx.lineTo(bX-(isMaj?7:4), ty); ctx.stroke();
  }
}

    for (let i = 0; i < 72; i++) {
      const ang  = (i/72)*s.TWO_PI;
      const main = i%9===0, med = i%3===0;
      const ir   = outerR - (main ? 17 : med ? 10 : 5);
      const or   = outerR + (main ? 2 : 0);
      s.stroke(main?52:med?32:16, main?76:med?46:24, main?138:med?84:50);
      s.strokeWeight(main ? 2 : 1);
      s.line(s.cos(ang)*ir, s.sin(ang)*ir, s.cos(ang)*or, s.sin(ang)*or);
    }

    // 8 diamond markers on outer ring
    for (let i = 0; i < 8; i++) {
      const ang = (i/8)*s.TWO_PI;
      const dx  = s.cos(ang)*outerR, dy = s.sin(ang)*outerR;
      const d   = i%2===0 ? 6 : 3.5;
      s.push();
      s.translate(dx, dy);
      s.rotate(s.PI/4);
      s.strokeWeight(1);
      if (res >= WIN_THRESH) {
        s.fill(160, 130, 0, 180); s.stroke(255, 215, 0, 200);
      } else {
        s.fill(14, 24, 62); s.stroke(44, 70, 148);
      }
      s.rect(-d/2, -d/2, d, d);
      s.pop();
    }

    // Radial guide lines (12)
    s.strokeWeight(0.5);
    for (let i = 0; i < 12; i++) {
      const ang = (i/12)*s.TWO_PI;
      s.stroke(10, 15, 36);
      s.line(0, 0, s.cos(ang)*outerR, s.sin(ang)*outerR);
    }

    // Inner guide circles
    s.strokeWeight(1); s.stroke(16, 25, 54);
    s.circle(0, 0, BASE_R*2);
    s.strokeWeight(0.5); s.stroke(11, 18, 40);
    s.circle(0, 0, (BASE_R+MAX_AMP)*2);

    // Slow-rotating outer hexagram
    s.push();
    s.rotate(sk.frameCount * 0.0014);
    s.stroke(20, 32, 72, 70); s.strokeWeight(0.5);
    const sR = outerR + 24;
    for (let i = 0; i < 6; i++) {
      const a1 = (i/6)*s.TWO_PI, a2 = ((i+3)/6)*s.TWO_PI;
      s.line(s.cos(a1)*sR, s.sin(a1)*sR, s.cos(a2)*sR, s.sin(a2)*sR);
    }
    s.pop();

    // Counter-rotating inner square star
    s.push();
    s.rotate(-sk.frameCount * 0.0021);
    s.stroke(16, 26, 60, 55); s.strokeWeight(0.5);
    const iR = BASE_R - 18;
    for (let i = 0; i < 4; i++) {
      const a1 = (i/4)*s.TWO_PI, a2 = ((i+2)/4)*s.TWO_PI;
      s.line(s.cos(a1)*iR, s.sin(a1)*iR, s.cos(a2)*iR, s.sin(a2)*iR);
    }
    s.pop();

    // Center dot
    s.noStroke(); s.fill(28, 44, 100); s.circle(0, 0, 7);

    s.pop();
  }

  // -- Target ghost signal --
  function drawTarget(s) {
    const tPts = polarPts(TARGET_CONFIG.map(t=>t.amp), TARGET_CONFIG.map(t=>t.phase));
    const pulse = 0.5 + 0.5 * Math.sin(sk.frameCount * 0.024);

    s.blendMode(s.ADD);
    s.noFill();

    const layers = [
      [12, Math.round( 7 + pulse*5)],
      [ 5, Math.round(14 + pulse*7)],
      [1.5, Math.round(70 + pulse*35)]
    ];
    for (const [w, a] of layers) {
      s.stroke(160, 185, 255, a);
      s.strokeWeight(w);
      s.beginShape();
      for (const [x,y] of tPts) s.vertex(x,y);
      s.endShape(s.CLOSE);
    }

    s.blendMode(s.BLEND);
  }

  // -- Individual signal ghosts --
  function drawIndividual(s) {
    s.blendMode(s.ADD);
    s.noFill();
    for (let i = 0; i < SIGNALS.length; i++) {
      if (pAmps[i] < 0.01) continue;
      const [r,g,b] = SIGNALS[i].rgb;
      const pts = [];
      for (let k = 0; k < N; k++) {
        const th = (k/N)*Math.PI*2;
        const rv = BASE_R + pAmps[i]*MAX_AMP*SIGNALS[i].fn(th + pPhases[i]);
        pts.push([rv*Math.cos(th), rv*Math.sin(th)]);
      }
      s.stroke(r, g, b, 18); s.strokeWeight(1.5);
      s.beginShape();
      for (const [x,y] of pts) s.vertex(x,y);
      s.endShape(s.CLOSE);
    }
    s.blendMode(s.BLEND);
  }

  // -- Combined signal (player) --
  function drawCombined(s, res) {
    const pts = polarPts(pAmps, pPhases);
    const f   = sk.frameCount;

    // Color interpolation: cyan -> violet -> gold
    let cr, cg, cb;
    if (res < 0.55) {
      const t = res / 0.55;
      cr = Math.round(77  + t*(140-77));
      cg = Math.round(220 + t*(80 -220));
      cb = 255;
    } else if (res < WIN_THRESH) {
      const t = (res - 0.55) / (WIN_THRESH - 0.55);
      cr = Math.round(140 + t*(255-140));
      cg = Math.round(80  + t*(210-80));
      cb = Math.round(255 + t*(0  -255));
    } else {
      const pulse = 0.85 + 0.15*Math.sin(f*.10);
      cr = 255; cg = Math.round(210*pulse); cb = 0;
    }

    const gm = res >= WIN_THRESH ? 1.6 : 1;

    s.blendMode(s.ADD);
    s.noFill();
    for (const [w, a] of [
      [16, Math.round(10*gm)],
      [ 8, Math.round(22*gm)],
      [ 3, Math.round(55*gm)],
      [1.5, 210]
    ]) {
      s.stroke(cr, cg, cb, a);
      s.strokeWeight(w);
      s.beginShape();
      for (const [x,y] of pts) s.vertex(x,y);
      s.endShape(s.CLOSE);
    }
    s.blendMode(s.BLEND);
  }
});
</script>
